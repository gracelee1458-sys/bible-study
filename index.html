        /* 스트릭 불 애니메이션 */
        .fire-animation {
            animation: fireBounce 1s ease-in-out infinite;
        }
        
        @keyframes fireBounce {

            50% { transform: scale(1.2); }

        /* 체크박스 스타일 */

    <script>
        // ==========================================
        // 1. 글로벌 상태 및 초기 변수 선언
        // ==========================================
        const SUPABASE_URL = "https://bvgpnnhfslakhfpwecsc.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_6jix0T8L_hxKQ_tDVfLc5Q_eGgNzJiT";

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMember = localStorage.getItem('currentMember') || '';
        let currentCalendarMonth = new Date();
        
        let weeklyChartInstance = null;
        let monthlyChartInstance = null;

        // DB 조회용 안전한 날짜(YYYY-MM-DD) 형식 변환 함수
        function formatDateToYYYYMMDD(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // ==========================================
        // 2. 사용자 로그인 및 관리
        // ==========================================
        function saveMember() {
            const memberSelect = document.getElementById('member-select');
            const selectedMember = memberSelect.value;

            if (!selectedMember) {
                alert('조원을 선택해주세요.');
                return;
            }

            currentMember = selectedMember;
            localStorage.setItem('currentMember', selectedMember);
            
            updateUIForMember();
            showToast(`${selectedMember}님이 입장했습니다! 👋`, 'success');
        }

        function updateUIForMember() {
            const currentUserText = document.getElementById('current-user-text');
            if (currentMember) {
                currentUserText.innerHTML = `현재 사용자: <strong>${currentMember}</strong> <button onclick="logoutMember()" class="ml-2 px-3 py-1 bg-slate-300 dark:bg-slate-600 text-slate-800 dark:text-white rounded text-xs font-semibold hover:bg-slate-400 dark:hover:bg-slate-500 transition">전환</button>`;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('stats-section').style.display = 'block';
                document.getElementById('progress-section').style.display = 'block';
                document.getElementById('team-section').style.display = 'block';
                document.getElementById('bible-section').style.display = 'block';
                
                // 로그인 시 최초 데이터 로드 진행
                initAllData();
                switchTestament('OT');
            } else {
                currentUserText.textContent = '로그인이 필요합니다.';
                document.getElementById('stats-section').style.display = 'none';
                document.getElementById('progress-section').style.display = 'none';
                document.getElementById('team-section').style.display = 'none';
                document.getElementById('bible-section').style.display = 'none';
            }
        }

        function logoutMember() {
            currentMember = '';
            localStorage.removeItem('currentMember');
            document.getElementById('member-select').value = '';
            updateUIForMember();
            showToast('로그아웃되었습니다.', 'success');
        }

        // ==========================================
        // 3. 다크 모드
        // ==========================================
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // ==========================================
        // 4. 로딩 및 토스트 UI 제어
        // ==========================================
        function showLoading(isLoading) {
            const loader = document.getElementById('loadingSpinner');
            if (loader) {
                if (isLoading) loader.classList.remove('hidden');
                else loader.classList.add('hidden');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-lg font-semibold text-white animate-bounce pointer-events-auto ${
                type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            }`;
            toast.textContent = message;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ==========================================
        // 5. 통합 데이터 초기화 (Init All Data)
        // ==========================================
        async function initAllData() {
            if (!currentMember) return;
            showLoading(true);
            try {
                // 병렬 비동기 패치로 데이터베이스 정합성 맞추기

            const year = currentCalendarMonth.getFullYear();
            const month = currentCalendarMonth.getMonth();
            
            document.getElementById('calendarTitle').textContent = `${year}년 ${month + 1}월`;

                .from('reading_logs')

                .gte('read_date', formatDateToYYYYMMDD(firstDay))

            if (error) {
                console.error("달력 데이터 로드 에러:", error);
                return;
            }

            const readDatesSet = new Set(monthLogs ? monthLogs.map(log => log.read_date) : []);

            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());
            
            const calendarBody = document.getElementById('calendarBody');
            calendarBody.innerHTML = '';
            
            let currentDateObj = new Date(startDate);
            const todayStr = formatDateToYYYYMMDD(new Date());
            
            while (currentDateObj <= lastDay || currentDateObj.getDay() !== 0) {
                const row = document.createElement('tr');
                
                for (let i = 0; i < 7; i++) {
                    const cell = document.createElement('td');
                    cell.className = 'border p-2 text-center text-xs md:text-sm h-12 md:h-16 relative';
                    
                    const dateStr = formatDateToYYYYMMDD(currentDateObj);
                    
                    if (currentDateObj.getMonth() !== month) {
                        cell.className += ' bg-slate-100 dark:bg-slate-900 text-slate-400 dark:text-slate-500';
                    } else {
                        const hasRead = readDatesSet.has(dateStr);
                        
                        if (hasRead) {
                            cell.className += ' bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300 font-bold';
                        } else if (dateStr === todayStr) {
                            cell.className += ' bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 font-semibold';
                        } else {
                            cell.className += ' hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer';
                        }

                    cell.textContent = currentDateObj.getDate();
                    row.appendChild(cell);
                    currentDateObj.setDate(currentDateObj.getDate() + 1);
                }
                
                calendarBody.appendChild(row);
            }
        }

        // 연속 읽기(Streak) 정보 가져오기 및 업데이트
        async function updateStreakInfo() {
            if (!currentMember) return;

            const { data, error } = await _supabase
                .from('reading_logs')
                .select('read_date')
                .eq('user_name', currentMember)
                .order('read_date', { ascending: false });

            if (error) {
                console.error("Streak 로딩 실패:", error);
                return;
            }

            // 중복 및 시간 부분 제거하고 날짜 유일 집합 생성
            const uniqueDates = Array.from(new Set(data.map(log => log.read_date))).sort((a, b) => new Date(b) - new Date(a));

            let currentStreak = 0;
            let longestStreak = 0;
            let tempStreak = 0;

            const todayStr = formatDateToYYYYMMDD(new Date());
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = formatDateToYYYYMMDD(yesterday);

            const hasRecentRead = uniqueDates.includes(todayStr) || uniqueDates.includes(yesterdayStr);

            if (hasRecentRead) {
                let checkDate = uniqueDates.includes(todayStr) ? new Date(todayStr) : new Date(yesterdayStr);
                while (true) {
                    const checkStr = formatDateToYYYYMMDD(checkDate);
                    if (uniqueDates.includes(checkStr)) {
                        currentStreak++;
                        checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        break;
                    }
                }
            }

            // 최장 스트릭 계산
            if (uniqueDates.length > 0) {
                let prevDate = null;
                for (let i = 0; i < uniqueDates.length; i++) {
                    const currDate = new Date(uniqueDates[i]);
                    if (!prevDate) {
                        tempStreak = 1;
                    } else {
                        const diffTime = Math.abs(prevDate - currDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        
                        if (diffDays === 1) {
                            tempStreak++;
                        } else if (diffDays > 1) {
                            if (tempStreak > longestStreak) longestStreak = tempStreak;
                            tempStreak = 1;
                        }
                    }
                    prevDate = currDate;
                }
                if (tempStreak > longestStreak) longestStreak = tempStreak;
            }

            document.getElementById('currentStreakText').textContent = `${currentStreak}일`;
            document.getElementById('longestStreakText').textContent = `${longestStreak}일`;

            // 연속 읽기 리스트 업데이트 (여기서는 간단한 대시보드로 처리)
            const streakList = document.getElementById('streak-list');
            if (streakList) {
                streakList.innerHTML = '';
                const members = ['김우자', '오영옥', '이은혜', '임현화'];
                const emojis = ['🔵', '🟣', '🟡', '🔴'];

                for (let i = 0; i < members.length; i++) {
                    const memberName = members[i];
                    // 간소화된 주간 데이터로 대략적인 스트릭 표시
                    const item = document.createElement('div');
                    item.className = 'p-4 bg-slate-50 dark:bg-slate-700 rounded-lg';
                    item.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-sm md:text-base">${emojis[i]} ${memberName}</span>
                            <span class="text-orange-500 font-bold text-base">🔥 활성화</span>
                        </div>
                    `;
                    streakList.appendChild(item);
                }
            }
        }

                return;
            }

            const readChaptersSet = new Set(readLogs ? readLogs.map(log => log.chapter_num) : []);

            for (let i = 1; i <= chapters; i++) {
                const btn = document.createElement('button');
                btn.className = 'p-2 rounded-lg text-xs font-semibold transition checkbox-item';
                btn.textContent = i;
                btn.dataset.chapter = i;

                if (readChaptersSet.has(i)) {
                    btn.classList.add('bg-emerald-500', 'text-white');
                } else {
                    btn.classList.add('bg-slate-100', 'dark:bg-slate-700', 'text-slate-800', 'dark:text-white', 'hover:bg-emerald-500', 'dark:hover:bg-emerald-600');
                }

                btn.onclick = () => toggleChapter(btn, bookName, i);
                grid.appendChild(btn);
            }
        }

        // 개별 성경 장 클릭 시 Supabase CRUD 처리 로직
        async function toggleChapter(element, bookName, chapterNum) {
            const isSelecting = !element.classList.contains('bg-emerald-500');
            const todayStr = formatDateToYYYYMMDD(new Date());

            showLoading(true);

            if (isSelecting) {
                // Supabase DB에 독서 기록 추가(Insert)
                const { error } = await _supabase
                    .from('reading_logs')
                    .insert([{ 
                        user_name: currentMember, 
                        book_name: bookName, 
                        chapter_num: chapterNum, 
                        read_date: todayStr 
                    }]);

                if (error) {
                    showToast("기록 저장 중 오류가 발생했습니다.", "error");
                    console.error("Insert 에러:", error);
                    showLoading(false);
                    return;
                }

                element.classList.add('bg-emerald-500', 'text-white');
                element.classList.remove('bg-slate-100', 'dark:bg-slate-700', 'text-slate-800', 'dark:text-white');
                showToast(`${bookName} ${chapterNum}장 선택됨!`, 'success');
            } else {
                // Supabase DB에서 독서 기록 삭제(Delete)
                const { error } = await _supabase
                    .from('reading_logs')
                    .delete()
                    .eq('user_name', currentMember)
                    .eq('book_name', bookName)
                    .eq('chapter_num', chapterNum);

                if (error) {
                    showToast("기록 삭제 중 오류가 발생했습니다.", "error");
                    console.error("Delete 에러:", error);
                    showLoading(false);
                    return;
                }

                element.classList.remove('bg-emerald-500', 'text-white');
                element.classList.add('bg-slate-100', 'dark:bg-slate-700', 'text-slate-800', 'dark:text-white');
                showToast(`${bookName} ${chapterNum}장 취소됨!`, 'info');
            }

            showLoading(false);
            // 대시보드 및 달력 통계 리프레시
            await initAllData();
        }

        // 전체 선택 및 취소 기능
        async function toggleAllChapters(select) {
            const chapters = document.querySelectorAll('#chapters-grid button');
            const todayStr = formatDateToYYYYMMDD(new Date());

            showLoading(true);

            if (select) {
                const insertData = [];
                chapters.forEach(btn => {
                    const chapterNum = parseInt(btn.dataset.chapter);
                    if (!btn.classList.contains('bg-emerald-500')) {
                        insertData.push({
                            user_name: currentMember,
                            book_name: selectedBook,
                            chapter_num: chapterNum,
                            read_date: todayStr
                        });
                        btn.classList.add('bg-emerald-500', 'text-white');
                        btn.classList.remove('bg-slate-100', 'dark:bg-slate-700', 'text-slate-800', 'dark:text-white');
                    }
                });

                if (insertData.length > 0) {
                    const { error } = await _supabase.from('reading_logs').insert(insertData);
                    if (error) {
                        console.error("전체 선택 에러:", error);
                        showToast("DB 저장 중 오류 발생", "error");
                    }
                }
            } else {
                chapters.forEach(btn => {
                    btn.classList.remove('bg-emerald-500', 'text-white');
                    btn.classList.add('bg-slate-100', 'dark:bg-slate-700', 'text-slate-800', 'dark:text-white');
                });

                const { error } = await _supabase
                    .from('reading_logs')
                    .delete()
                    .eq('user_name', currentMember)
                    .eq('book_name', selectedBook);

                if (error) {
                    console.error("전체 삭제 에러:", error);
                    showToast("DB 삭제 중 오류 발생", "error");
                }
            }

            showLoading(false);
            await initAllData();
            showToast(`${select ? '모든 장을 선택했습니다' : '모든 장을 취소했습니다'}!`, 'success');
        }

        // ==========================================
        // 9. 관리자 기능 (백업 및 초기화)
        // ==========================================
        function addTeamMember() {
            const input = document.getElementById('new-member-input');
            const newMemberName = input.value.trim();

            if (!newMemberName) {
                alert('이름을 입력해주세요.');
                return;
            }

            const option = document.createElement('option');
            option.value = newMemberName;
            option.textContent = `✨ ${newMemberName}`;
            document.getElementById('member-select').appendChild(option);

            input.value = '';
            showToast(`${newMemberName} 추가됨`, 'success');
        }

        async function backupData() {
            const { data, error } = await _supabase.from('reading_logs').select('*');
            if (error) {
                showToast("백업 데이터 추출 실패", "error");
                return;
            }
            const dataStr = JSON.stringify(data, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const exportFileDefaultName = `성경용사_서버백업_${new Date().toISOString().split('T')[0]}.json`;

            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();

            showToast('서버 데이터 백업 완료!', 'success');
        }

        async function resetAllProgress() {
            if (confirm('⚠️ 경고! Supabase 서버 내 모든 데이터가 삭제됩니다. 정말 초기화하시겠습니까?')) {
                showLoading(true);
                // 실 서비스에서는 특정 테이블 전체 삭제를 권장하지 않으므로, 조원의 데이터만 리셋하거나 테이블 자체 삭제 API 사용
                const { error } = await _supabase.from('reading_logs').delete().neq('user_name', 'SystemDefault');
                showLoading(false);
                
                if (error) {
                    showToast("초기화 도중 오류 발생", "error");
                    console.error(error);
                } else {
                    localStorage.clear();
                    location.reload();
                }
            }
        }

        // ==========================================
        // 10. PWA 설치 및 초기 바인딩
        // ==========================================
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').classList.remove('hidden');
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        showToast('앱이 설치되었습니다!', 'success');
                    }
                    deferredPrompt = null;
                    document.getElementById('install-prompt').classList.add('hidden');
                });
            }
        }

        function hideInstallPrompt() {
            document.getElementById('install-prompt').classList.add('hidden');
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateUIForMember();
            switchTab('today');
            
            document.getElementById('prevMonthBtn')?.addEventListener('click', () => {
                currentCalendarMonth.setMonth(currentCalendarMonth.getMonth() - 1);
                updateCalendar();
            });
            
            document.getElementById('nextMonthBtn')?.addEventListener('click', () => {
                currentCalendarMonth.setMonth(currentCalendarMonth.getMonth() + 1);
                updateCalendar();
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(err => {
                console.log('Service Worker 등록 실패:', err);
            });
        }
    </script>
</body>
</html>
