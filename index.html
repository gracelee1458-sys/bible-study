        // ==================== 통계 ====================
        async function loadStats() {
            try {
                const { data, error } = await _supabase
                    .from('reading_logs')
                    .select('member, created_at')
                    .neq('member', SYSTEM_KEY);

                if (error) throw error;

                // 날짜별 통계
                const today = new Date().toISOString().split('T')[0];
                const weekStart = getWeekStart();
                const monthStart = getMonthStart();

                // 오늘 통계
                const todayData = data.filter(log => log.created_at.split('T')[0] === today);
                renderTodayStats(todayData);

                // 주간 통계
                const weekData = data.filter(log => log.created_at.split('T')[0] >= weekStart);
                renderWeekStats(weekData);

                // 월간 통계
                const monthData = data.filter(log => log.created_at.split('T')[0] >= monthStart);
                renderMonthStats(monthData);

                // 달력
                renderCalendar(data);

                // 스트릭
                renderStreak(data);

                // 완독
                renderComplete();

            } catch (err) {
                console.error(err);
            }
        }

        function renderCalendar(data) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const counts = {};
            data.forEach(log => {
                const date = log.created_at.split('T')[0];
                const [y, m, d] = date.split('-');
                if (y == year && parseInt(m) == month + 1) {
                    counts[d] = (counts[d] || 0) + 1;
                }
            });

            const grid = document.getElementById("calendar-view");
            grid.innerHTML = "";

            // 요일 헤더
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach(day => {
                const el = document.createElement("div");
                el.className = "text-center font-bold text-xs md:text-sm text-slate-600 dark:text-slate-400 py-2";
                el.textContent = day;
                grid.appendChild(el);
            });

            // 빈 칸
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement("div"));
            }

            // 날짜
            for (let day = 1; day <= daysInMonth; day++) {
                const el = document.createElement("div");
                const count = counts[String(day).padStart(2, '0')] || 0;
                el.className = `aspect-square flex flex-col items-center justify-center rounded-lg text-xs md:text-sm font-bold transition-all ${
                    count > 0 ? 'bg-emerald-500 dark:bg-emerald-600 text-white' : 'bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300'
                }`;
                el.innerHTML = `<div>${day}</div><div class="text-[10px] opacity-80">${count > 0 ? count + '장' : ''}</div>`;
                grid.appendChild(el);
            }
        }

        // ==================== 유틸리티 ====================
        function updateTodayDate() {
            const today = new Date();
            const dateStr = `${today.getMonth() + 1}월 ${today.getDate()}일`;
            document.getElementById("today-date").textContent = dateStr;
        }

        function getWeekStart() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day;
            const weekStart = new Date(now.setDate(diff));
            return weekStart.toISOString().split('T')[0];
        }

        function getMonthStart() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
        }

        function calculateStreak(data, member) {
            const dates = new Set();
            data.forEach(log => {
                if (log.member === member) {
                    dates.add(log.created_at.split('T')[0]);
                }
            });

            if (dates.size === 0) return { current: 0, max: 0 };

            const sortedDates = Array.from(dates).sort().reverse();
            let current = 0;
            let max = 0;
            let expectedDate = new Date();

            for (let i = 0; i < sortedDates.length; i++) {
                const logDate = new Date(sortedDates[i]);
                const daysDiff = Math.floor((expectedDate - logDate) / (1000 * 60 * 60 * 24));

                if (daysDiff === 0 || daysDiff === 1) {
                    current++;
                    max = Math.max(max, current);
                    expectedDate = new Date(logDate);
                } else {
                    break;
                }
            }

            return { current, max };
        }

        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            
            const bgClass = type === "success" 
                ? "bg-emerald-600 text-white" 
                : type === "error" 
                ? "bg-red-600 text-white" 
                : "bg-blue-600 text-white";

            toast.className = `px-4 md:px-5 py-2 md:py-3 rounded-lg shadow-lg text-xs md:text-sm font-semibold transform translate-y-4 opacity-0 transition-all duration-300 pointer-events-auto ${bgClass}`;
            toast.textContent = message;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove("translate-y-4", "opacity-0");
            }, 10);

            setTimeout(() => {
                toast.classList.add("translate-y-4", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode'));
        }

        // 저장된 다크모드 설정 로드
        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // ==================== PWA ====================
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') {
                        showToast("홈 화면에 추가되었습니다! 🎉", "success");
                    }
                    deferredPrompt = null;
                    closePWAPrompt();
                });
            }
        }

        function closePWAPrompt() {
            document.getElementById("install-prompt").classList.add("hidden");
        }

        // ==================== 관리자 기능 ====================
        async function addTeamMember() {
            const name = document.getElementById("new-member-input").value.trim();
            if (!name) {
                showToast("이름을 입력하세요", "error");
                return;
            }

            showToast("기능 준비 중입니다", "info");
        }

        async function backupData() {
            try {
                const { data, error } = await _supabase
                    .from('reading_logs')
                    .select('*');

                if (error) throw error;

                let csv = "이름,책,장,날짜\n";
                data.forEach(row => {
                    csv += `${row.member},"${row.book}",${row.chapter},"${row.created_at}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.setAttribute("href", URL.createObjectURL(blob));
                link.setAttribute("download", `성경용사_백업_${new Date().toISOString().split('T')[0]}.csv`);
                link.click();

                showToast("백업 완료!", "success");
            } catch (err) {
                console.error(err);
                showToast("백업 실패", "error");
            }
        }

        async function resetAllProgress() {
            if (!confirm("정말로 모든 진도를 초기화하시겠습니까?")) return;
            if (!confirm("되돌릴 수 없습니다. 정말 진행하시겠습니까?")) return;

            try {
                const { error } = await _supabase
                    .from('reading_logs')
                    .delete()
                    .neq('member', SYSTEM_KEY);

                if (error) throw error;

                showToast("초기화 완료", "success");
                await loadUserData();
            } catch (err) {
                console.error(err);
                showToast("초기화 실패", "error");
            }
        }

    </script>

</body>
</html>
